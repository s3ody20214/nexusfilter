<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusFilter — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c1222;--text:#fff;--text-s:rgba(255,255,255,.6);--accent:#2563eb;--green:#10b981;--border:rgba(255,255,255,.08);--r:14px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,rgba(37,99,235,.12),transparent);pointer-events:none}
.container{position:relative;text-align:center;padding:40px 24px;max-width:560px}
.code{font-family:'JetBrains Mono',monospace;font-size:120px;font-weight:700;color:transparent;-webkit-text-stroke:2px rgba(37,99,235,.4);line-height:1;margin-bottom:8px;animation:flicker 4s ease-in-out infinite}
@keyframes flicker{0%,100%{-webkit-text-stroke-color:rgba(37,99,235,.4)}50%{-webkit-text-stroke-color:rgba(37,99,235,.7)}}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:40px}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:10px;position:relative}
.logo-mark::after{content:'';position:absolute;width:16px;height:16px;border:2.5px solid #fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.logo-mark::before{content:'';position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
.logo-name span{color:var(--accent)}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:12px}
p{font-size:15px;color:var(--text-s);margin-bottom:36px;line-height:1.7}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;text-decoration:none;transition:all .25s}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.4)}
.btn-o{background:transparent;color:var(--text-s);border:1.5px solid var(--border)}
.btn-o:hover{border-color:rgba(255,255,255,.3);color:#fff;transform:translateY(-2px)}
.links{display:flex;gap:24px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.links a{color:var(--text-s);text-decoration:none;font-size:13px;font-weight:600;transition:color .2s}
.links a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <div class="logo-row">
    <div class="logo-mark"></div>
    <div class="logo-name">Nexus<span>Filter</span></div>
  </div>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Check the URL or navigate back to safety.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-p">← Go Home</a>
    <a href="docs.html" class="btn btn-o">Documentation</a>
  </div>
  <div class="links">
    <a href="index.html#features">Features</a>
    <a href="index.html#licenses">Pricing</a>
    <a href="discord.html">Discord</a>
    <a href="terms.html">Terms</a>
  </div>
</div>
</body>
</html>
